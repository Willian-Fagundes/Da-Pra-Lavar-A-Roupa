name: Relatório Lavanderia Email

on:
  schedule:
    - cron: "0 8 */2 * *"
  workflow_dispatch:

jobs:
  enviar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Instalar dependências
        run: pip install requests pandas numpy matplotlib msal python-dotenv 

      - name: Rodar e enviar
        env:
          OPEN_WEATHER_API:         ${{ secrets.OPEN_WEATHER_API }}
          EMAIL_REMETENTE: ${{ secrets.EMAIL_REMETENTE }}
          SENHA_EMAIL:     ${{ secrets.SENHA_EMAIL }}
          EMAIL_DESTINO:   ${{ secrets.EMAIL_DESTINO }}
        run: python src/app.py